<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTrioLab Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text-dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px}
.logo span{background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text-dim)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.container{max-width:1200px;margin:0 auto;padding:24px}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:14px;color:var(--text-dim);flex-wrap:wrap}
.breadcrumb a{color:var(--accent);cursor:pointer}
.breadcrumb .sep{color:var(--border)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-card .value{font-size:28px;font-weight:700;color:#fff}
.stat-card .sub{font-size:12px;color:var(--text-dim);margin-top:4px}
.browser{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.browser-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.browser-header h2{font-size:15px;font-weight:600}
.search-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;width:260px;outline:none;transition:border .2s}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text-dim)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 20px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);border-bottom:1px solid var(--border);font-weight:600}
td{padding:12px 20px;font-size:14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover{background:rgba(88,166,255,.04)}
td:first-child{width:40px}
.icon{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:16px}
.file-name{color:#fff;font-weight:500;cursor:pointer}
.file-name:hover{text-decoration:none;color:var(--accent)}
.size{color:var(--text-dim);font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-dir{background:rgba(88,166,255,.15);color:var(--accent)}
.badge-file{background:rgba(63,185,80,.15);color:var(--green)}
.badge-img{background:rgba(188,140,255,.15);color:var(--purple)}
.badge-code{background:rgba(210,153,34,.15);color:var(--yellow)}
.empty{padding:60px 20px;text-align:center;color:var(--text-dim)}
.empty .icon-large{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px}
footer{text-align:center;padding:24px;color:var(--text-dim);font-size:12px;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:768px){
.stats{grid-template-columns:1fr 1fr}
.search-box{width:100%}
.browser-header{flex-direction:column;gap:10px;align-items:flex-start}
th:nth-child(3),td:nth-child(3){display:none}
}
</style>
</head>
<body>
<header>
<div class="logo">
<svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="url(#g)"/><path d="M8 14l3.5 3.5L20 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="g" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#58a6ff"/><stop offset="1" stop-color="#bc8cff"/></linearGradient></defs></svg>
<span>MyTrioLab</span>
</div>
<div class="header-right">
<span class="status-dot"></span> Online
<span>|</span>
<span id="clock"></span>
</div>
</header>
<div class="container">
<div class="breadcrumb" id="breadcrumb"><a onclick="navigateTo('/')">🏠 Home</a></div>
<div class="stats">
<div class="stat-card"><div class="label">Total Files</div><div class="value" id="stat-files">—</div><div class="sub">in current directory</div></div>
<div class="stat-card"><div class="label">Folders</div><div class="value" id="stat-dirs">—</div><div class="sub">subdirectories</div></div>
<div class="stat-card"><div class="label">Total Size</div><div class="value" id="stat-size">—</div><div class="sub">combined</div></div>
<div class="stat-card"><div class="label">Server</div><div class="value" style="font-size:18px">Python</div><div class="sub">localhost:8080</div></div>
</div>
<div class="browser">
<div class="browser-header">
<h2>📁 File Browser</h2>
<input type="text" class="search-box" placeholder="🔍 Search files..." id="search" oninput="filterFiles()">
</div>
<table>
<thead><tr><th></th><th>Name</th><th>Size</th><th>Type</th></tr></thead>
<tbody id="file-list"><tr><td colspan="4" class="empty"><div class="icon-large">⏳</div><p>Loading...</p></td></tr></tbody>
</table>
</div>
</div>
<footer>MyTrioLab Dashboard &copy; 2026 &mdash; Powered by Cloudflare Tunnel</footer>
<script>
let currentPath = '/';

function updateClock(){
  const d=new Date();
  document.getElementById('clock').textContent=d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
updateClock();setInterval(updateClock,1000);

function formatSize(bytes){
  if(!bytes||bytes===0)return '—';
  const k=1024;const s=['B','KB','MB','GB','TB'];
  const i=Math.floor(Math.log(bytes)/Math.log(k));
  return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+' '+s[i];
}

function getFileIcon(name){
  const e=name.split('.').pop().toLowerCase();
  const i={js:'📜',py:'🐍',go:'🔵',php:'🐘',ts:'📘',html:'🌐',css:'🎨',json:'📋',md:'📝',txt:'📄',jpg:'🖼️',png:'🖼️',gif:'🖼️',svg:'🖼️',zip:'📦',gz:'📦',sh:'⚙️',sql:'🗃️',yaml:'📋',yml:'📋',env:'🔒'};
  return i[e]||'📄';
}

function getBadge(name,isDir){
  if(isDir)return{badge:'badge-dir',text:'dir'};
  const e=name.split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','svg','webp','ico'].includes(e))return{badge:'badge-img',text:'image'};
  if(['js','py','go','php','ts','jsx','tsx','html','css','json','yaml','yml','sh','sql','rs','java','c','cpp','h'].includes(e))return{badge:'badge-code',text:'code'};
  return{badge:'badge-file',text:'file'};
}

function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function navigateTo(path){
  currentPath = path;
  loadFiles(path);
  updateBreadcrumb(path);
  history.pushState({path}, '', path === '/' ? '/' : path);
}

function updateBreadcrumb(path){
  const bc = document.getElementById('breadcrumb');
  if(path === '/'){bc.innerHTML='<a onclick="navigateTo(\'/\')">🏠 Home</a>';return;}
  const parts = path.split('/').filter(Boolean);
  let html = '<a onclick="navigateTo(\'/\')">🏠 Home</a>';
  let build = '';
  parts.forEach((p,i)=>{
    build += '/'+p;
    html+=` <span class="sep">/</span> ${i===parts.length-1?`<span>${escapeHtml(decodeURIComponent(p))}</span>`:`<a onclick="navigateTo('${build}/')">${escapeHtml(decodeURIComponent(p))}</a>`}`;
  });
  bc.innerHTML = html;
}

async function loadFiles(path){
  const list = document.getElementById('file-list');
  list.innerHTML='<tr><td colspan="4" class="empty"><div class="icon-large">⏳</div><p>Loading...</p></td></tr>';
  try{
    const res = await fetch('/api/files' + path);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data = await res.json();
    const files = data.files || [];
    let fileCount=0,dirCount=0,totalSize=0;

    files.forEach(f=>{
      if(f.isDir)dirCount++;else{fileCount++;totalSize+=f.size||0;}
    });

    document.getElementById('stat-files').textContent=fileCount;
    document.getElementById('stat-dirs').textContent=dirCount;
    document.getElementById('stat-size').textContent=formatSize(totalSize);

    if(files.length===0){
      list.innerHTML='<tr><td colspan="4" class="empty"><div class="icon-large">📭</div><p>Directory is empty</p></td></tr>';
      return;
    }

    // Sort: dirs first, then files
    files.sort((a,b)=>{
      if(a.isDir&&!b.isDir)return-1;
      if(!a.isDir&&b.isDir)return 1;
      return a.name.localeCompare(b.name);
    });

    let html = '';
    // Parent dir link
    if(path && path !== '/'){
      const parent = path.replace(/\/+$/, '').replace(/\/[^\/]+\/?$/, '/') || '/';
      html+=`<tr><td><span class="icon">⬆️</span></td><td><span class="file-name" onclick="navigateTo('${parent}')">..</span></td><td class="size">—</td><td><span class="badge badge-dir">parent</span></td></tr>`;
    }

    files.forEach(f=>{
      const badge = getBadge(f.name, f.isDir);
      const icon = f.isDir ? '📁' : getFileIcon(f.name);
      const size = f.isDir ? '—' : formatSize(f.size);
      const clickAction = f.isDir
        ? `navigateTo('${path.replace(/\/$/,'')}/${encodeURIComponent(f.name)}/')`
        : `window.open('/api/download?path=${encodeURIComponent(f.path)}','_blank')`;
      html+=`<tr><td><span class="icon">${icon}</span></td><td><span class="file-name" onclick="${clickAction}">${escapeHtml(f.name)}</span></td><td class="size">${size}</td><td><span class="badge ${badge.badge}">${badge.text}</span></td></tr>`;
    });

    list.innerHTML = html;
    window._allFiles = files;
  }catch(e){
    list.innerHTML=`<tr><td colspan="4" class="empty"><div class="icon-large">❌</div><p>Error: ${e.message}</p></td></tr>`;
  }
}

function filterFiles(){
  const q = document.getElementById('search').value.toLowerCase();
  const rows = document.querySelectorAll('#file-list tr');
  rows.forEach(row=>{
    const name = row.querySelector('.file-name')?.textContent?.toLowerCase()||'';
    row.style.display = name.includes(q) ? '' : 'none';
  });
}

// Handle browser back/forward
window.addEventListener('popstate', (e)=>{
  if(e.state && e.state.path){
    currentPath = e.state.path;
    loadFiles(e.state.path);
    updateBreadcrumb(e.state.path);
  }
});

// Init
navigateTo('/');
</script>
</body>
</html>
